<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextTube Portal</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <style>
        :root { --bg: #0f0f0f; --header: #0f0f0f; --card: #1e1e1e; --text: #ffffff; --accent: #ff0000; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; height: 60px; background: var(--header); 
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100;
        }

        .search-container { display: flex; flex: 1; max-width: 500px; margin: 0 20px; }
        .search-container input { 
            flex: 1; padding: 10px 15px; border-radius: 20px 0 0 20px; 
            border: 1px solid #333; background: #000; color: white; outline: none;
        }
        .search-container button { 
            padding: 0 20px; border-radius: 0 20px 20px 0; 
            border: 1px solid #333; background: #222; color: white; cursor: pointer;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; padding: 20px; 
        }

        .video-card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); }
        
        .thumb-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; cursor: pointer; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; border: none; }
        .thumb-wrapper.playing iframe { display: block; }

        .info { padding: 12px; }
        .info h3 { margin: 0; font-size: 14px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .info p { color: #aaa; font-size: 12px; margin: 8px 0 0; }

        #loader { text-align: center; padding: 50px; font-weight: bold; color: var(--accent); display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: bold; color: var(--accent);">MyTube <span style="color:white">X</span></div>
    <div class="search-container">
        <input type="text" id="q" placeholder="検索...">
        <button onclick="search()"><span class="material-symbols-outlined">search</span></button>
    </div>
</header>

<div id="loader">サーバーと通信中...</div>
<div class="grid" id="results"></div>

<script>
    // 稼働率の高い最新サーバーリスト
    const API_LIST = [
        "https://pipedapi.kavin.rocks",
        "https://pipedapi.lunar.icu",
        "https://api.piped.victr.me",
        "https://pipedapi.moomoo.me",
        "https://pipedapi.rivo.cc"
    ];

    async function search() {
        const query = document.getElementById('q').value;
        if (!query) return;

        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        
        loader.style.display = 'block';
        results.innerHTML = '';

        let found = false;
        for (const api of API_LIST) {
            try {
                // 3秒でタイムアウトさせる設定
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 3000);

                const res = await fetch(`${api}/search?q=${encodeURIComponent(query)}&filter=videos`, { signal: controller.signal });
                clearTimeout(timeout);
                
                if (!res.ok) continue;
                const data = await res.json();
                
                if (data.items && data.items.length > 0) {
                    render(data.items);
                    found = true;
                    break;
                }
            } catch (e) {
                console.warn(`Server ${api} failed, trying next...`);
            }
        }

        loader.style.display = 'none';
        if (!found) {
            results.innerHTML = '<p style="text-align:center; width:100%;">現在、すべてのサーバーが応答していません。時間をおいて試してください。</p>';
        }
    }

    function render(items) {
        const container = document.getElementById('results');
        items.forEach(item => {
            const videoId = item.url.split('v=')[1];
            if (!videoId) return;

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumb-wrapper" onclick="play(this, '${videoId}')">
                    <img src="${item.thumbnail}" alt="thumbnail">
                    <iframe src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="info">
                    <h3>${item.title}</h3>
                    <p>${item.uploaderName}</p>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function play(wrapper, id) {
        // 全体の動画をリセット
        document.querySelectorAll('.thumb-wrapper').forEach(w => {
            w.classList.remove('playing');
            w.querySelector('iframe').src = '';
        });

        // クリックした動画を再生
        wrapper.classList.add('playing');
        wrapper.querySelector('iframe').src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1`;
    }

    // 初回読み込み
    window.onload = () => {
        document.getElementById('q').value = '最新音楽';
        search();
    };
</script>
</body>
</html>
